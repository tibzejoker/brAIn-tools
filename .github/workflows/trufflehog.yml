name: trufflehog

# Complementary to gitleaks — wider pattern catalogue + LIVE
# verification of every match (calls the API the secret would unlock,
# so unverified candidates are silently dropped). `--only-verified`
# means: zero noise, but anything that fires is a real, active leak
# and the credential must be rotated immediately.
#
# Why no `base`/`head` inputs: on push events to the default branch
# the trufflehog action errors out when BASE == HEAD (a known quirk).
# Omitting them lets the action auto-derive the diff from the GitHub
# event payload — `before..after` on push, `base.sha..head.sha` on PR.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: trufflehog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # trufflehog needs history to scan the past too
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
