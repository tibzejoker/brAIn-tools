name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same ref — only the latest matters for PR
# turnaround. `cancel-in-progress: true` is essential when a fix-up
# commit lands before the previous CI finishes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Storeproject nodes reference `@brain/sdk@workspace:*` so the
    # brAIn workspace must sit alongside. `scripts/test-with-mandatory.mjs`
    # clones brAIn from GitHub when the `--download-mandatory-missing-nodes`
    # flag is set (CI), or fails fast if it's missing locally (dev).
    #
    # Checkout `path:` puts this repo at `storeprojects/<name>/`, mirroring
    # the user's local layout (~/.../brAIn/, ~/.../storeprojects/<name>/).
    name: workspace tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this storeproject
        uses: actions/checkout@v4
        with:
          path: storeprojects/${{ github.event.repository.name }}

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test (auto-clones brAIn workspace if missing)
        working-directory: storeprojects/${{ github.event.repository.name }}
        run: node scripts/test-with-mandatory.mjs --download-mandatory-missing-nodes
